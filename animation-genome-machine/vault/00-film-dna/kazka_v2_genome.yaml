        DR. BERGER: "Then what's right?"

        OLENKA: "Nothing. Both of you are right and both of you are
        wrong and there ISN'T an answer. The remembering hurts.
        The forgetting kills. I'm stuck between them forever."

        DR. BERGER: (long pause) "Yes."

        OLENKA: "That's it? That's all you have?"

        DR. BERGER: "Olenka... that IS the answer. You don't solve it.
        You carry it."

        Silence. Rain.

        Olenka looks at the book. She looks at Lys, who is watching her
        with an expression she's never seen on his face before — not
        contempt, not amusement. Something like recognition.

        LYS: (very quietly) "The old woman knew. The stories were never
        supposed to stay in the book. And they were never supposed to
        come out like this. They were supposed to be TOLD. By you. To
        someone. Not held. Not released. Told."

        OLENKA: "But telling costs memories too."

        LYS: "Everything costs something. The question is what you
        get in return."

        INSIGHT: The fairy tales don't have to be KEPT (hoarded, like
        Halyna feared) or RELEASED (expelled, like the trauma responses).
