    - id: beat_02
      name: "Theme Stated"
      function: "The theme delivered by someone Olenka will dismiss"
      timestamp_pct: 0.04
      duration_pct: 0.03
      content: >
        An aid worker — MARIE (French, 40s, kind but overwhelmed, nicotine
