    - id: beat_05
      name: "Debate"
      function: "Olenka tests the rules — can she control this?"
      timestamp_pct: 0.17
      duration_pct: 0.08
      content: >
        Three days of Olenka experimenting:

        1. She reads a DIFFERENT story — "Mavka" (a forest spirit). Nothing
           happens. She wasn't feeling anything. Just curiosity.
        2. She reads "The Iron Wolf" while angry at Herr Neumann for
