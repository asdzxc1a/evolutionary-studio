genome_version: "3.0"
source_dna: "zootopia_reference_genome"
created: "2026-06-01"
previous_version: "kazka_v2_genome.yaml"
title: "Казка (Kazka)"
subtitle: "The stories she carries are eating the memories she needs."
logline: >
  A 14-year-old Ukrainian refugee in Berlin discovers that her grandmother's
  fairy tales are manifesting in the real world — protecting her from threats
  but consuming her memories of home as fuel. To stop losing herself, she must
  stop weaponizing the stories and learn to TELL them — transforming trauma
  from armor into offering. But first she has to survive the Temporary
  Protection Directive review that could send her back.

genre: "Psychological drama / folk horror / displacement story"
tone: "Spirited Away meets Son of Saul — wonder that costs something real"
runtime_target_minutes: 88
target_audience: "14+ (PG-13 equivalent — psychological intensity, no gore)"

thematic_thesis: >
  Stories are not weapons or shields. They are bridges. But you have to
  cross them yourself — no one can carry you. And crossing means leaving
  something on the other side. The question is whether you choose what
  you leave, or let fear choose for you.

thematic_antithesis: >
  Some bridges should be burned. Some stories are prisons disguised as
  gifts. Halyna gave Olenka a cage made of folklore, and the only way
  out is to refuse the inheritance entirely.

thematic_synthesis: >
  The stories ARE Olenka — they're not separable from her identity. But
  they must evolve from her grandmother's voice to her own. The inheritance
  isn't the cage; the refusal to reinterpret is. Olenka doesn't burn the
  bridge or cross it. She rebuilds it with different materials, in a
  different direction — toward people, not away from them.

