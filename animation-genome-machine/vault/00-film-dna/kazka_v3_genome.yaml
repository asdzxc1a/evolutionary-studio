    # ---- FIX #5: Lys's arrival is DANGEROUS ----
    - id: beat_04
      name: "Catalyst"
      function: "The fairy tales breach the real world — and it's NOT magical"
      timestamp_pct: 0.12
      duration_pct: 0.05
      content: >
        BERLIN. Neumanns' apartment, first week.

        Olenka is alone in the guest room (now her room). The Neumanns
        are kind but the kindness is structural — Frau Neumann follows
        a checklist from the integration office. Clean towels on Tuesday.
        German lessons Wednesday. "How are you feeling?" every evening
        at 7 PM exactly.

        Olenka opens the book to read herself to sleep. She turns to
        "Lys Mykyta" — the Fox Trickster. The smartest creature in
        Ukrainian folklore. The one who helps heroes by lying to everyone.

        She reads the first line aloud: "Mykyta came to the farmer's
        gate when the moon was wrong and the chickens slept with one
        eye open."

        The page goes WARM. Then HOT. Olenka drops the book.

        On the windowsill: LYS (a fox the size of a cat, copper-furred,
        one eye amber, one eye black, wearing a tiny embroidered vest
        that matches Olenka's vyshyvanka). He doesn't appear magically —
        he's just THERE, as if he's always been there and Olenka only
        just noticed.

        LYS: "Finally. Do you know how long I've been waiting in that
        page? It smells like old paper and your grandmother's hand cream."

        Olenka backs against the wall. Not charmed. TERRIFIED.

        [FIX #5 — Lys's arrival is dangerous:]
        The room temperature drops. Olenka's breath mists. The IKEA
        lamp on the desk EXPLODES — glass everywhere. In the hallway,
        Frau Neumann calls out: "Olenka? Alles in Ordnung?"

        Lys cocks his head. "That wasn't me. That was you. You CALLED
        me with something — what was the feeling? Right before you
        read the line? What were you feeling?"

        Olenka was feeling RAGE. At the checklist kindness. At the
        clean towels on a schedule. At the fact that she's supposed to
        be grateful for a room that isn't hers in a country that isn't
        hers speaking a language that isn't hers.

        Lys: "Ah. Rage. Good fuel. Bad aim. You need to be more careful
        what you feel when you read, little storyteller. These aren't
        bedtime stories anymore."

        [FIX #5 — COST of arrival:]
        Olenka's phone buzzes. A text from the Calais center — Danylo's
        mother, forwarding a photo Olenka took of herself with Danylo.
        Olenka looks at the photo. She remembers taking it. She remembers
        his face. But the NAME. She can't remember his name. She JUST
        knew it. It was — she can see his face, the missing tooth, the
        blue jacket — but the name is gone.

        Six-letter word. Started with D. Or was it M?

        The cost has begun.

      emotional_valence: 0.1
      emotional_arousal: 0.8
      characters_present: [char_olenka, char_lys]
      causes: "Olenka's suppressed rage + reading aloud = manifestation trigger"
      consequence: "Lys is now present; first memory cost extracted (Danylo's name)"
      seeds_planted:
