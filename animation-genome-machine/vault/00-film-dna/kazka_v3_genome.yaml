        She reads in Ukrainian. The child doesn't understand all the words
        (he's from Kherson, different dialect) but he listens anyway. The
        story is "The Firebird and the Horse of Power" — about a servant
        who captures impossible things for a cruel king and is rewarded
        with nothing.

        Olenka reads flatly. Mechanically. Like someone taking medicine.

        IMPORTANT: In this scene, Olenka is COMPETENT. She navigates the
        center — she knows which aid worker gives extra bread (Marie), which
        bathroom has hot water (the one near the kitchen, after 6 AM), which
        families to avoid (the ones who fight at night). This isn't her first
        center. This is expertise born from exhaustion.

        The book's pages glow faintly. Olenka doesn't notice. Danylo does.
        His eyes widen. He says nothing.

      emotional_valence: -0.3
      emotional_arousal: 0.2
      characters_present: [char_olenka]

      # v3 addition: causal chain
      causes: "Displacement from Kharkiv → Kraków → Calais pipeline"
      consequence: "Establishes Olenka's competence AND her mechanical relationship with the stories"
      seeds_planted:
