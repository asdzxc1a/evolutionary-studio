    # === ACT 1: SETUP (beats 1-4) ===

    - id: beat_01
      name: "Opening Image"
      function: "Establish the BEFORE — what displacement looks like from inside"
      timestamp_pct: 0.00
      duration_pct: 0.04
      content: >
        CALAIS, FRANCE. A processing center that used to be a gymnasium.
        Basketball lines still visible under the cots.

        Olenka (14, sharp-faced, dark circles, hair pulled back with a
        rubber band because she lost her clip in Kraków) sits on cot 47,
        reading to a younger child — Danylo (6). The book is oversized,
        cloth-bound, hand-illustrated. Halyna's book. The fairy tales
