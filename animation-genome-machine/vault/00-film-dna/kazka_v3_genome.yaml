        a police car. You know what that does to a kid? Growing up
        watching your mother flinch?"

        OLENKA: "My grandmother didn't flinch. She just... stopped
        talking about certain things."

        ELIF: "Same disease. Different symptom."

        This scene establishes Elif as a MIRROR — not a sidekick. She's
        what Olenka COULD become: someone who's learned to survive the
        system but hasn't healed from it. The difference is Elif is ANGRY
        about the right things. Olenka is angry about everything.

      emotional_valence: 0.0
      emotional_arousal: 0.5
      characters_present: [char_olenka, char_lys, char_elif]
      causes: "Olenka's engineer brain tries to systematize the manifestations"
      consequence: "Rules partially understood; Elif provides mirror for displacement anger"
      seeds_planted:
        - "Stories respond to NEED, not will — Olenka can't control them"
        - "Elif's 'same disease, different symptom' = thematic echo"
        - "The Ausländerbehörde will return at beat_11 as antagonist"

    - id: beat_06
      name: "Break into Two"
      function: "Olenka chooses to USE the manifestations — the wrong choice"
      timestamp_pct: 0.25
      duration_pct: 0.04
      content: >
        A specific incident forces Olenka's hand:

        Three boys from the upper school corner Elif in the stairwell.
        "Kopftuchmädchen" (headscarf girl). One of them grabs Elif's
        backpack strap and pulls. Not violent — just enough to humiliate.
        The universal grammar of bullying: show the target they exist at
        your discretion.

        Olenka sees this from the landing above. She feels the rage
        building — not for herself, for ELIF. For the first time, the
        anger isn't selfish.

        She doesn't open the book. She doesn't need to. She THINKS of
        the Iron Wolf and FEELS the protective fury and the Wolf
        MANIFESTS —

        Not fully. A shadow. An impossible darkness in the stairwell.
        The lights flicker and die. A sound like metal dragging on
        concrete — SCRAAAPE. The temperature plummets.

        The three boys look up. They can't SEE the Wolf but they can
        FEEL it. The primal knowledge that something with teeth is in
        the dark with you.

        They run.

        Elif, shaking: "What just happened?"
        Olenka: "Bad wiring."
        Elif: (looking at Olenka differently) "That wasn't bad wiring."

        [COST: Olenka loses a memory — the smell of Halyna's kitchen.
        Borscht and dill and warm bread. She tries to recall it walking
        home and gets NOTHING. Not even a ghost of the scent.]

        Lys, walking beside her: "Effective. Expensive. You used the Wolf
        without the book — that means the stories are IN you now. They're
        not on the page anymore. They're in your blood. And blood is what
        they eat."

        THE CHOICE: Olenka decides to keep using the manifestations.
        She'll be the protector. She couldn't protect Halyna (who stayed
        behind in Kharkiv when Olenka was sent west). She'll protect
        everyone else. With stories made into weapons.

        This is the WRONG CHOICE and the audience should feel it.

      emotional_valence: 0.3
      emotional_arousal: 0.7
      characters_present: [char_olenka, char_lys, char_elif]
      causes: "Witnessing Elif's bullying + protective rage = weaponized manifestation"
      consequence: "Olenka commits to using stories as weapons; memory hemorrhage accelerates"
      seeds_planted:
        - "Stories are IN her now, not just in the book — no off switch"
        - "She couldn't protect Halyna — this is compensation, not growth"
        - "Elif notices something supernatural — she'll investigate"

    # === ACT 2A: FUN AND GAMES / PROMISE OF THE PREMISE ===

    - id: beat_07
      name: "B-Story / Fun and Games"
      function: "The premise delivers — Olenka weaponizes folklore"
      timestamp_pct: 0.29
      duration_pct: 0.13
      content: >
        A MONTAGE WITH CONSEQUENCES:

        1. THE MAVKA INTERVENTION (Week 3):
           A landlord threatens a Syrian family in the building with eviction
           (illegal, but he knows they won't fight it). Olenka reads the
           Mavka story near his office. Mavka manifests as a woman made of
           birch bark and river water, standing in the landlord's kitchen
           when he gets home. He sees her for 1.5 seconds. She says nothing.
           He never mentions the eviction again.
           COST: Olenka forgets the name of her school in Kharkiv.

        2. THE FIREBIRD WARNING (Week 5):
           A skinhead group tags the building with anti-refugee graffiti.
           Olenka summons the Firebird — a creature of absolute light —
           which burns the paint off the wall at 3 AM. The wall is scorched
           but clean. Neighbors talk about arson. Nobody was hurt.
           COST: Olenka forgets her father's face. (He left when she was 5.
           She barely remembered him anyway. She tells herself it doesn't
           matter. It does.)

        3. THE VODIANYK FLOOD (Week 7):
           A bureaucrat at the school denies Elif's request for prayer room
           access. "This is a secular institution." Olenka summons the
           Vodianyk (water spirit) in the school's plumbing. Every toilet on
           the third floor overflows simultaneously. School closed for a day.
           Elif gets her prayer room in the reopened building.
           COST: Olenka forgets Halyna's bedtime routine — the specific
           sequence. Was it teeth, then story, then prayer? Or prayer first?
           She can't remember. The order is gone.

        PATTERN: Each manifestation is MORE POWERFUL and the cost is MORE
        INTIMATE. She's ascending a ladder of power while descending a
        ladder of self.

        Meanwhile, the B-STORY: Dr. BERGER (school psychologist, German,
        50s, reads Taras Shevchenko in translation, has a framed photo
        of her own grandmother who fled the DDR in 1961).

        Berger doesn't push. She leaves her door open. Olenka comes in
        one day to avoid lunch (she eats alone, not out of sadness but
        strategy — the cafeteria is too loud for someone who grew up
        with air raid sirens).

        BERGER: "You don't have to talk. You can just sit."

        Olenka sits. For twenty minutes. Then:

        OLENKA: "Do you believe in stories?"
        BERGER: "I believe stories are how people carry what they can't say."
        OLENKA: "What if the stories start carrying you?"
        BERGER: (pause, pen click) "Then you need to ask who you were
        before the stories started."

      emotional_valence: 0.4
      emotional_arousal: 0.6
      characters_present: [char_olenka, char_lys, char_elif, char_berger]
      causes: "Olenka's choice to weaponize stories = escalating power + costs"
      consequence: "Memory loss accelerating; Berger offers alternative framework"
      seeds_planted:
        - "Each cost is more personal — approaching identity-level loss"
        - "Berger's question: 'who were you before the stories' = Act 3 answer"
        - "Elif benefits from manifestations — creating dependency dynamic"

    - id: beat_08
      name: "Midpoint"
      function: "False victory that is ACTUALLY a false victory"
      timestamp_pct: 0.42
      duration_pct: 0.08
      content: >
        Olenka is POWERFUL. She walks through the school with the quiet
        authority of someone who has a weapon nobody can see. The bullies
        have stopped. The bureaucrats are confused. Elif is protected.
        Even Lys seems impressed.

        FALSE VICTORY: Frau Neumann tells Olenka her Temporary Protection
        has been renewed for another year. Olenka cries — the first time
        she's cried since Kharkiv. She thinks she's safe.

        That night, she opens the book to celebrate. She wants to read
        for PLEASURE, not power. She turns to her favorite story — "The
        Blacksmith and the Devil" — and realizes she can't remember WHY
        it's her favorite. She remembers the plot. She remembers Halyna
        reading it. But the FEELING — the specific feeling of being six
        years old on the couch with Halyna's arm around her, the radiator
        clicking, the feeling of being held inside a story — is GONE.

        She is holding the book but the book is no longer holding her.

        LYS: (serious for the first time) "You've been spending memories
        like currency. Did you think there was no inflation?"

        OLENKA: "I'll stop using them. I'll just — stop."

        LYS: "You can't stop. They're in you now. Every strong feeling
        you have, the stories hear it. Every rage, every fear, every
        love — they lean toward it like plants toward light. You made
        yourself a lighthouse, Olenka. And now the stories are moths."

        MIDPOINT REVERSAL: It's not that Olenka is using the stories.
        The stories are using HER. Every emotion she feels feeds them.
        The only way to stop the hemorrhage is to stop feeling — which
        is exactly what she was doing at beat_01. The circle closes.

        [FIX #2 — HALYNA MEMORY — THE FIGHT:]
        A flash: the fight with Halyna. Full scene now. Kharkiv apartment,
        the night before Olenka was sent west with the evacuation bus.

        HALYNA: "Take the book. It's everything I know."
        OLENKA: "I don't want your stupid stories! I want to stay with you!"
        HALYNA: "You can't stay."
        OLENKA: "Then come WITH me!"
        HALYNA: "Someone has to stay and remember this place."
        OLENKA: "You're choosing a BUILDING over me?"
        HALYNA: (slaps her — the only time — then holds her face) "I'm
        choosing that you LIVE. The building is already dead. Take the
        book. Promise me you'll read it."
        OLENKA: "Your stories won't save anyone."
        HALYNA: "They already did. They saved me in 1986. They saved
        your mother in 2004. They'll save you now. But only if you let them."

        Olenka took the book. She didn't promise.

      emotional_valence: 0.5
      emotional_arousal: 0.7
      characters_present: [char_olenka, char_lys, char_halyna]
      causes: "Accumulated manifestation costs reach critical mass"
      consequence: "Olenka discovers she can't stop — stories are autonomous now"
      seeds_planted:
        - "1986, 2004 — the stories have saved people before (generational pattern)"
        - "Olenka never promised to read them — she broke the transmission chain"
        - "The slap will echo in beat_12"

    # === ACT 2B: BAD GUYS CLOSE IN ===

    - id: beat_09
      name: "Bad Guys Close In"
      function: "The protagonist IS the bad guy — she hurts Anna"
      timestamp_pct: 0.50
      duration_pct: 0.08
      content: >
        Olenka hurts Anna.

        Anna (10, Neumanns' daughter, round-faced, tries too hard,
        carries a stuffed rabbit named Hase) has been trying to befriend
        Olenka for weeks. She leaves chocolate on Olenka's desk. She
        asks to hear Ukrainian words. She shows Olenka her book
        collection with desperate hospitality.

        One evening, Anna tells Olenka about a birthday party she wasn't
        invited to. Her best friend Lena invited everyone except her.
        Anna's voice is small. She's asking for the universal gesture of
        childhood connection: "this happened to me — does it matter?"

        Olenka looks at this ten-year-old with her horse duvet and purple
        fairy lights and IKEA furniture and parents who say "how are you
        feeling" every evening — and something breaks.

        OLENKA: (flat, quiet) "That's your problem? Someone didn't invite
        you to a party?"

        (two seconds of silence)

        "You've never had a real problem in your life."

        Anna's face crumbles. Not dramatically. A ten-year-old learning
        that someone she wanted to like her thinks she's nothing. She
        picks up Hase. She walks to the bathroom. Door closes. Lock clicks.

        Through the wall: a child crying quietly, trying not to be heard.

        Olenka's jaw tightens. Her hand moves toward the door. Stops. Drops.
        She CANNOT knock. Because knocking means admitting she was wrong,
        and being wrong means Anna's pain and her pain can coexist, and
        that means the hierarchy of suffering she's built her identity on
        is a lie.

        Lys appears on the windowsill. Not smirking.

        LYS: "That was ugly."
        OLENKA: "Shut up."
        LYS: "You just did what everyone has done to you. Told someone
        their pain doesn't count."

        The Iron Wolf manifests — unbidden, fed by shame. He fills the
        hallway, iron scraping walls, and his tail SWIPES the Neumann
        family photo off the wall. Glass shatters. Anna screams from
        the bathroom.

        The Wolf looks at Olenka with nothing. Pre-moral. Force shaped
        like an animal, summoned by a feeling she couldn't contain.

        He fades. The glass remains.

      emotional_valence: -0.6
      emotional_arousal: 0.8
      characters_present: [char_olenka, char_lys]
      causes: "Accumulated rage + suffering hierarchy = cruelty toward Anna"
      consequence: "Olenka becomes the thing she hates; Wolf now manifests WITHOUT intent"
      seeds_planted:
        - "Unbidden manifestation = loss of control"
        - "Anna's trust destroyed — will need rebuilding in Act 3"
        - "Lys's mirror: 'you did what everyone did to you'"

    - id: beat_10
      name: "All Is Lost"
      function: "Halyna's face disappears — the deepest cost"
      timestamp_pct: 0.58
      duration_pct: 0.07
      content: >
        Olenka tries to remember Halyna's face.

        She's in the school hallway, sitting against the wall, eyes closed.
        Trying to PULL the memory back. Halyna's face — round, deep lines
        around the mouth, grey hair always pulled back, the mole above
        her left eyebrow—

        Wait. Was it the left eyebrow? Or the right? And were her eyes
        brown or hazel? Olenka KNOWS THIS. She's known it for fourteen
        years. The face she's seen every day of her life until eight
        months ago.

        It's gone. Not faded — EXTRACTED. Like a tooth pulled clean.
        The socket is still there but the thing is gone.

        She opens the book. Turns to a page where Halyna drew a
        self-portrait in the margin — a tiny sketch in blue ink. The
        sketch is there. The face is there. But Olenka can't connect it
        to the FEELING of Halyna. It's a drawing of a stranger who
        made this book.

        OLENKA: (to Lys, broken) "I can't see her anymore."
        LYS: (no jokes, no wit) "I know."
        OLENKA: "Is it gone forever?"
        LYS: "I don't know. I'm a story. I don't know how memory works
        in your world. I know how it works in mine: we remember everything
        because we never change. You forget because you do."

        BERGER finds Olenka in the hallway. Doesn't ask what's wrong.
        Sits down next to her. Waits.

        OLENKA: (eventually) "If you forget someone's face, do you still
        love them?"
        BERGER: "Yes."
        OLENKA: "How do you know?"
        BERGER: "Because the love isn't in the face. It's in the ache
        where the face used to be."

        Six seconds of silence. Berger doesn't fill it with comfort.
        She lets the truth sit.

      emotional_valence: -0.8
      emotional_arousal: 0.4
      characters_present: [char_olenka, char_lys, char_berger]
      causes: "Accumulated manifestation costs culminate in deepest loss"
      consequence: "Olenka's identity anchor (Halyna's face) is gone"
      seeds_planted:
        - "Berger's line: 'the love is in the ache' = reframe for Act 3"
        - "Lys admits his own limitation — he's a story, not a healer"

    # ---- FIX #6: Legal displacement context as plot threat ----
    - id: beat_11
      name: "Dark Night of the Soul"
      function: "Everything collapses simultaneously — internal AND external"
      timestamp_pct: 0.65
      duration_pct: 0.10
      content: >
        Three blows in 72 hours:

        1. LEGAL BLOW: A letter from the Ausländerbehörde. Olenka's
           Temporary Protection is being reviewed — not revoked, but
           "reassessed under burden-sharing protocols." Translation:
           they might transfer her to Saxony. Away from Berlin, the
           Neumanns, Berger, Elif, the school. The letter is addressed
           to Halyna (who registered them both). Olenka would need to
           appear with a guardian. She doesn't HAVE a guardian in Germany.

           The Neumanns are not her legal guardians. They're
           "Gastfamilie" — host family. They can write a letter of
           support but they can't sign for her.

           ELIF: (reading the letter, furious) "They do this. They
           move people around like furniture. My cousin got transferred
           to Mecklenburg — a village of 200 people. She lasted four
           months before she went back to Turkey."

        2. EMOTIONAL BLOW: Frau Neumann tells Olenka that Anna has been
           sleeping in her parents' room since "the incident." She
           doesn't accuse. She says, "Anna is scared, Olenka. Not of
           you — of the thing in the hallway." Frau Neumann has found
           a rational explanation (earthquake tremor, old building) but
           Anna hasn't. Anna KNOWS something came out of Olenka.

        3. [FIX #4 — 3rd cost is SELF, not another person:]
           IDENTITY BLOW: Olenka looks in the mirror and doesn't
           recognize her own face. Not metaphorically. LITERALLY. She
           sees a girl — brown hair, dark circles, chapped lips, the
           vyshyvanka she always wears — and feels nothing. No connection.
           Like looking at a photograph of someone else.

           She says her own name: "Olenka." It sounds foreign. Like
           a word in a language she's forgetting.

           The third cost isn't a memory of SOMEONE ELSE. It's a
           memory of HERSELF. She has given away so many pieces of her
           past that the thread connecting her to her own identity has
           frayed. She is a girl with stories but no story of her own.

        LYS is silent. He sits on the bathroom sink, grooming his tail,
        not looking at her. She realizes: he's AFRAID. A fairy tale fox
        who has never been afraid before is afraid — because if Olenka
        loses herself completely, he has no one to manifest FOR. She
        is his world. And his world is disappearing.

        LYS: (quietly) "You need to stop, Olenka. Not the stories.
        Not the manifestations. You need to stop HIDING. That's what's
        eating you. Not the magic. The silence."

      emotional_valence: -0.9
      emotional_arousal: 0.6
      characters_present: [char_olenka, char_lys, char_elif]
      causes: "Legal, emotional, and identity threats converge"
      consequence: "Olenka's self-concept fragmenting; Lys reveals his own fear"
      seeds_planted:
        - "Legal hearing = ticking clock for Act 3"
        - "Lys is afraid = he's not just a tool, he's dependent on her"
        - "The 'silence' is the real enemy — not the stories"

    # === ACT 3: RESOLUTION ===

    # ---- FIX #2: Mother confrontation — REAL fight, real words ----
    - id: beat_12
      name: "Break into Three / Mother Confrontation"
      function: "The catalyst for change — Halyna's VIDEO MESSAGE arrives"
      timestamp_pct: 0.75
      duration_pct: 0.07
      content: >
        A message arrives through the Red Cross family tracing service.
        Halyna is ALIVE. She recorded a video message from a shelter
        in Dnipro (she evacuated Kharkiv three months after Olenka left).

        Olenka watches on Berger's office computer (she doesn't want the
        Neumanns to see).

        The video: Halyna, thinner, grey hair cut short now, sitting in
        front of a cinder block wall. She speaks in Ukrainian. She's
        trying to be strong but her hands shake.

        HALYNA: (video) "Зайчику мій. My little rabbit. I am alive.
        I am in Dnipro. The apartment is gone. The building is—" (she
        stops, composes) "—the building is gone. I have the photographs
        your mother left. I have my coat. That's everything."

        Then — the confrontation. Not gentle. Not idealized.

        HALYNA: (video) "I know you're angry at me. You should be. I
        made a choice and the choice was wrong. I thought staying meant
        something. It didn't. It meant standing in an empty building
        while my granddaughter crossed Europe alone with a book she
        didn't ask for."

        (pause)

        "But I need you to hear this, Olenka: I gave you the book because
        it was the only thing I had that was MINE to give. Your mother
        left. Your father left. I stayed and I told you stories because
        stories were the only thing that couldn't be shelled or starved
        or taken at a checkpoint."

        (pause, harder)

        "But I should have told you the TRUTH inside the stories.
        Not just the plots — the truth. That Lys is a LIAR. That the
        Iron Wolf destroys what he protects. That Mavka dies when she
        falls in love with a human. I told you the beautiful versions.
        I should have told you the real ones."

        [FIX #2 — THE REAL FIGHT:]
        Olenka SCREAMS at the video. At a recorded message that can't
        hear her.

        OLENKA: "You LEFT me! You put me on a bus with a BOOK! I was
        FOURTEEN! I didn't need stories — I needed YOU!"

        She throws the book at the wall. Pages scatter.

        OLENKA: "And now the stories are EATING ME and you're not here
        and you gave me a weapon that's KILLING me and you called it
        LOVE—"

        She stops. Because she hears it. She hears herself. She sounds
        exactly like she sounded in the kitchen in Kharkiv: "Your stupid
        stories won't save us."

        The SLAP echoes — not literally. In her memory. Except now she
        understands: Halyna slapped her because Halyna was TERRIFIED.
        Not angry. Terrified that the only thing she could give her
        granddaughter was being rejected.

        Olenka picks up the pages. One by one. Hands shaking. She puts
        them back in the book. Not in order. The order is wrong now.
        That's okay.

        BERGER: (who has been sitting silently through all of this)
        "What do you want to do?"
        OLENKA: "I want to tell her I'm sorry."
        BERGER: "For what?"
        OLENKA: "For calling them stupid. They're not stupid. They're
        just hers. And I need to make them mine."

      emotional_valence: -0.4
      emotional_arousal: 0.9
      characters_present: [char_olenka, char_halyna, char_berger]
      causes: "Halyna's video breaks through Olenka's emotional fortress"
      consequence: "Olenka understands: she must REINTERPRET the stories, not reject them"
      seeds_planted:
        - "'Make them mine' = Act 3 action: retelling, not repeating"
        - "Book pages out of order = the stories can be rearranged"

    - id: beat_13
      name: "Finale Part 1 — Gathering the Team"
      function: "Olenka prepares to TELL, not USE"
      timestamp_pct: 0.82
      duration_pct: 0.05
      content: >
        Olenka makes three visits in one afternoon:

        1. ANNA: She knocks on Anna's bedroom door. Anna opens it holding
           Hase, suspicious. Olenka doesn't apologize with words first —
           she hands Anna the book. "I want to show you something. But
           only if you want to see it."
           Anna: "Is it the thing from the hallway?"
           Olenka: "It's... what made the thing from the hallway. But it's
           not scary when you choose to show it."
           Anna lets her in.

        2. ELIF: At the kebab shop. Olenka tells Elif the truth. All of it.
           The manifestations, the costs, the memories.
           Elif: "You're insane."
           Olenka: "Probably."
           Elif: "Show me."
           Olenka reads a line from the book — the Firebird entry. A
           single feather of light appears on the table between them, warm,
           golden, then dissolves.
           Elif: (staring at where it was) "Does it hurt?"
           Olenka: "Every time."
           Elif: "Then why do it?"
           Olenka: "Because I'm going to do it differently now."

        3. BERGER: Olenka tells Berger about the Ausländerbehörde hearing.
           Berger makes a phone call. The hearing can include a "cultural
           integration assessment" — if Olenka can demonstrate meaningful
           community engagement, it strengthens her case.
           Berger: "Is there something you could do? Something that shows
           who you are, not just where you're from?"

        The plan forms: Olenka will hold a STORYTELLING at the Neukölln
        community center. Not a performance. A TELLING. She will read
        from the book — but in her own words. She will translate the
        stories not from Ukrainian to German, but from Halyna's voice
        to her own.

      emotional_valence: 0.2
      emotional_arousal: 0.5
      characters_present: [char_olenka, char_elif, char_berger]
      causes: "Olenka's Act 3 decision: tell, don't wield"
      consequence: "Alliance formed; storytelling planned; legal strategy aligned"
      seeds_planted:
        - "The Firebird feather = first VOLUNTARY, shared manifestation (no cost?)"
        - "Community center = public arena for finale"

    - id: beat_14
      name: "Finale Part 2 — The Telling"
      function: "Climax — Olenka tells the stories in her own voice"
      timestamp_pct: 0.87
      duration_pct: 0.08
      content: >
        Neukölln Community Center. Evening.

        The audience: Elif, Anna, Berger, the Neumanns, Danylo's mother
        (who traveled from Calais), a dozen refugees from the neighborhood,
        a woman from the Ausländerbehörde (Berger invited her — brilliant
        move), and a scattering of German neighbors who came because the
        flyer said "Ukrainische Märchenerzählung" (Ukrainian fairy tale
        telling) and they were curious.

        Olenka stands at the front. No stage. A folding table with the
        book. Elif sits next to her to translate (Ukrainian → German) but
        Olenka keeps switching between languages herself — sometimes
        mid-sentence. Nobody minds. The stories don't care about grammar.

        She tells the stories DIFFERENTLY:

        1. THE IRON WOLF: "My grandmother told me the Wolf was a guardian.
           But I used him as a weapon. The real story is: the Wolf protects
           what he loves by becoming the thing that scares everyone else.
           And then nobody can love HIM. So he's alone. Forever.
           I've been the Wolf."

           [The Wolf manifests — but DIFFERENTLY. Small. The size of a
           real wolf. Not iron — grey fur, tired eyes. He lies at Olenka's
           feet like a dog who has finally been allowed to rest. The
           audience gasps but doesn't flee. The Wolf is NOT scary when
           he's not weaponized.]

        2. LYS MYKYTA: "The Fox Trickster. He helped me. He lied to me.
           He told me truths I wasn't ready to hear. In my grandmother's
           version, Lys tricks a king and wins gold. In MY version, Lys
           tricks a girl into thinking she's stronger alone. She's not."

           [Lys manifests — full visibility. He walks along the table,
           bushy tail held high, and for the first time, people OTHER
           than Olenka can see him. He bows to the audience. Small,
           theatrical. Elif laughs — the first genuine laugh in the film.]

        3. MAVKA: "The forest spirit who dies when she falls in love
           with a human. My grandmother told it as a tragedy. I think
           it's about what happens when you love across a border that
           wasn't supposed to be crossed. You don't die. But you can't
           go back to what you were."

           [Mavka appears — birch and water and light — and she looks
           at Olenka. Not with sadness. With recognition. Then she
           dissolves into leaves that blow out the open door.]

        THE COST — but different: Olenka loses a memory during the telling.
        But this time she CHOOSES which one. She lets go of the fight in
        the kitchen — not the memory itself, but the SHAME of it. The
        words "your stupid stories won't save us" lift off her like a
        weight she's been carrying across four countries.

        The shame dissolves. The memory stays, reframed. She said a cruel
        thing to a terrified woman. She was fourteen. She was scared.
        That's all it was.

        Anna reaches up and takes Olenka's hand. She's holding Hase in
        the other arm. She doesn't say anything. She just holds on.

      emotional_valence: 0.8
      emotional_arousal: 0.9
      characters_present: [char_olenka, char_lys, char_elif, char_berger]
      causes: "Olenka retells stories in her own voice — voluntary manifestation"
      consequence: "Stories transform from weapons to bridges; shame released"
      seeds_planted:
        - "The Wolf at rest = protection without destruction"
        - "Others CAN see the creatures when Olenka shares willingly"

    # ---- FIX #3: Ending stays in Europe (Berlin-Neukölln) ----
    - id: beat_15
      name: "Final Image"
      function: "Mirror of opening — same action, transformed meaning"
      timestamp_pct: 0.95
      duration_pct: 0.05
      content: >
        THREE WEEKS LATER.

        Berlin-Neukölln. Olenka's room — no longer the "guest room."
        Frau Neumann took down the generic Bauhaus print and Olenka put
        up a drawing Anna made: the Iron Wolf, but with flowers growing
        out of his fur. It's terrible art. It's the best thing on the wall.

        The Ausländerbehörde hearing went... okay. Not victorious. "Okay"
        is the speed of bureaucracy. Berger's letter helped. The community
        center telling was entered as evidence of "cultural integration
        activity." Olenka's case is deferred — not resolved. She has
        another year. Maybe two. The uncertainty is permanent. That's
        what "temporary protection" means.

        [FIX #3 — No America. The ending is HERE:]
        Olenka is NOT in a triumph montage. She's sitting on her bed,
        video-calling Halyna on Berger's old iPad. The connection is bad
        (Dnipro infrastructure). Halyna's face pixelates, freezes, returns.

        OLENKA: (in Ukrainian) "Babusya. I told the story of Lys. But I
        changed the ending."
        HALYNA: (grainy, smiling) "Changed how?"
        OLENKA: "In your version, Lys wins and everyone else loses.
        In mine, Lys wins and ADMITS he needed help."
        HALYNA: "That's not how the story goes."
        OLENKA: "It is now."
        HALYNA: (long pause, pixelated face, then): "Добре. Tell me
        your version."

        Olenka opens the book. The pages are out of order. Some are
        stained, some torn, some have Olenka's own handwriting in the
        margins — she's been ADDING to the book. Not replacing Halyna's
        stories. Annotating them. Continuing them.

        She reads. In her own voice.

        FINAL SHOT: The vyshyvanka's embroidery. The red has returned —
        but slightly warmer, slightly orange. Not the original red.
        A new red. Not restoration. Continuation.

        Lys sits on the windowsill. Visible to no one but her. He
        grooms his tail. Outside: Berlin in autumn. A mosque minaret
        and a church steeple visible from the same window. Children
        playing in the courtyard below — at least three languages audible.

        LYS: "Same time tomorrow?"
        OLENKA: "Same time tomorrow."

        She turns a page.

      emotional_valence: 0.4
      emotional_arousal: 0.2
      characters_present: [char_olenka, char_lys, char_halyna]
      causes: "Act 3 choices bear fruit — but messy, incomplete, REAL fruit"
      consequence: "Olenka becomes a storyteller, not a story-wielder"
      seeds_planted:
        - "The uncertainty is permanent — no Hollywood resolution"
        - "Olenka ADDS to the book — continuation, not preservation"
        - "Same time tomorrow — the stories continue"

# ===========================================================================
# STRAND 2: CHARACTER DNA (Upgraded — deeper arcs, v3 fixes applied)
# ===========================================================================
character_dna:
  characters:

    - id: char_olenka
      name: "Olenka Hrytsenko"
      archetype: "The Wounded Wielder — power without wisdom"
      role: protagonist
      age: 14
      nationality: Ukrainian (Kharkiv)
      languages: ["Ukrainian", "Russian (passive)", "Polish (survival)", "French (basic)", "German (learning)"]
      physical: >
        Sharp-featured, dark circles permanent. Hair pulled back with
        rubber band (lost her clip in Kraków). Vyshyvanka (embroidered
        blouse) worn EVERY DAY — red embroidery that desaturates through
        the film. Thin wrists. Bitten nails. Moves like someone always
        ready to leave a room quickly.
      psychological: >
        Hypervigilant. Competent beyond her years (navigates bureaucracies,
        translates documents, manages younger children). Uses competence
        as armor. Underlying belief: "If I am useful enough, they can't
        send me away." Anger is her default — not rage, but a low-grade
        fury at the UNFAIRNESS of displacement. She's not wrong to be
        angry. She's wrong about what to do with it.
      arc: >
        WEAPON → WOUND → WITNESS → TELLER.
        Beat 1: Olenka uses stories as anesthesia (reading mechanically).
        Beat 4-7: Uses stories as weapons (manifestations for protection).
        Beat 9-11: The weapon turns inward (hurts Anna, loses self).
        Beat 12-15: Transforms from wielder to teller (shares, not strikes).
      want: "Safety. Control. To never be helpless again."
      need: "To stop equating vulnerability with weakness."
      flaw: "Suffering hierarchy — believes her pain invalidates others'."
      dialogue_style: >
        Clipped, defensive. Accent strong in Ukrainian, deliberately
        flattened in German. Gets very quiet before cruelty — the silence
        is a warning sign. Cracks ONCE in the film: at beat_12, screaming
        at Halyna's video. After that, her voice changes — softer, less
        controlled, more HER.

    - id: char_lys
      name: "Lys Mykyta"
      archetype: "The Trickster Who Tells Truth Through Lies"
      role: mentor/shadow
      form: "Fox — cat-sized, copper fur, one amber eye, one black, embroidered vest"
      origin: "Ukrainian folklore — the Fox Trickster cycle"
      physical: >
        Copper-furred, smaller than a real fox. One amber eye (sees the
        present), one black eye (sees what you're hiding from yourself).
        Wears a tiny vest with embroidery that matches Olenka's vyshyvanka —
        because he came FROM her. Tail always moving — a lie detector
        (faster = more agitated). Sits on surfaces that are slightly
        too small for him.
      psychological: >
        Ancient, dry, precise. He KNOWS he's a story. He knows his
        limitations. He can advise but he can't ACT in the real world
        unless Olenka's emotions summon him. He's Olenka's externalized
        conscience — the part of her that sees clearly but can't make
        her listen. He is NOT a cute sidekick. He is frightening in
        his calm. He speaks uncomfortable truths while grooming his tail.
      arc: >
        ADVISOR → WITNESS → AFRAID → COMPANION.
        He begins confident (I know how stories work). He becomes a
        witness to Olenka's destruction (I can see but not stop it).
        He becomes AFRAID at beat_11 (if she loses herself, he ceases
        to exist). He ends as a companion — no longer advising, just
        present. "Same time tomorrow."
      dialogue_style: >
        Dry, archaic Ukrainian cadence even when speaking German. Precise.
        Never loud. Terrifyingly calm during truths. Uses "little
        storyteller" as an endearment that doubles as a reminder of what
        she's supposed to be.

    - id: char_halyna
      name: "Halyna Hrytsenko"
      archetype: "The Absent Authority — love that costs"
      role: catalyst/absent presence
      age: 68
      status: "Alive — evacuated to Dnipro (revealed at beat_12)"
      physical: >
        Round face, deep lines around mouth. Grey hair always pulled back.
        Mole above left eyebrow (or was it right? — this uncertainty
        becomes a plot point). Hands that drew every illustration in
        the book. Strong build — a woman who grew up in Soviet Ukraine
        and carries that posture.
      psychological: >
        Determined, not warm. Purposeful. She gave Olenka the book not
        as a gift but as a SURVIVAL KIT — the only inheritance she could
        guarantee wouldn't be confiscated at checkpoints. Her love is
        expressed through preparation, not affection. She stayed in Kharkiv
        because she believed someone should witness — that's both noble
        and selfish, and the film doesn't resolve which.
      arc: >
        ABSENT → REMEMBERED → CONFRONTED → CONNECTED.
        She exists as memory that degrades. Her face disappears at beat_10.
        Her VIDEO MESSAGE at beat_12 is the first time she's a REAL person
        in the film — not idealized, not demonized. She admits she was wrong.
        She asks to hear Olenka's version. That's the bridge.
      dialogue_style: >
        Low, determined. Not warm — purposeful. In video message: hands
        shaking, trying to be strong, Ukrainian with Kharkiv inflection.
        Her voice DEGRADES through the film — earlier memories are clear,
        later memories (as Olenka loses them) have audio artifacts,
        dropout, distortion.

    - id: char_elif
      name: "Elif Yılmaz"
      archetype: "The Mirror — displacement's other face"
      role: ally/mirror
      age: 13
      nationality: "Turkish-German (born in Turkey, raised in Berlin since age 3)"
      physical: >
        Hijab (dark blue, practical). Sharp features, fast eyes. Moves
        with the confidence of someone who knows the city and the
        wariness of someone the city hasn't fully accepted. Doc Martens.
        Backpack covered in keychains and protest pins.
      psychological: >
        Elif is NOT a sidekick. She's what Olenka COULD become: someone
        who's learned to survive the system without healing from it. She's
        angry about the RIGHT things (institutional racism, bureaucratic
        dehumanization) but has normalized the cost (her mother's flinching,
        her own armor). She's Olenka's mirror — same wound, different
        scar tissue.

        [FIX #1 — Elif has REAL displacement pain:]
        Her family's been in Germany 10 years. Her mother STILL flinches
        at police cars. Elif grew up watching a parent perform safety.
        She carries the weight of being "integrated" on paper while
        being "foreign" in practice. Her anger isn't theoretical — it's
        the specific rage of someone who does everything right and still
        gets called "the Turkish girl."
      arc: >
        GUIDE → BENEFICIARY → TRUTH-TELLER → TRANSLATOR.
        She starts as integration buddy (resentful). Benefits from
        Olenka's manifestations (prayer room). Confronts Olenka's
        self-destruction. Finally serves as co-translator at the telling —
        bridging Ukrainian and German, past and present.
      dialogue_style: >
        Fast, sharp, code-switches between German and Turkish idioms.
        Uses sarcasm as affection. Gets quiet (not loud) when truly
        angry — she learned this from watching her mother.

    - id: char_berger
      name: "Dr. Ingrid Berger"
      archetype: "The Witness — professional empathy as craft"
      role: mentor
      age: 52
      nationality: German
      physical: >
        Professional but not cold. Cardigan over blouse. Reading glasses
        on a chain. A framed photo of her grandmother on the desk —
        grandmother who fled the DDR in 1961. Pen that she clicks when
        thinking (audible in every scene).
      psychological: >
        School psychologist who reads Taras Shevchenko in translation.
        She doesn't PUSH. She leaves her door open. Her therapeutic
        approach is radical: she believes in sitting with discomfort
        rather than resolving it. She never says "I understand" because
        she doesn't — she's German, she hasn't been displaced. She says
        "I'm here" because she can guarantee that.
      arc: >
        AVAILABLE → TRUSTED → STRATEGIC → WITNESS.
        She doesn't change much — she's the stable element. But she
        ACTS at beat_13: she makes the phone call, she invites the
        Ausländerbehörde official, she turns therapeutic space into
        political strategy. This is the moment we see that her calm
        was never passivity — it was patience.
      dialogue_style: >
        Measured. Therapeutic cadence. German accent in English scenes.
        Pen clicking audible in her pauses. Never fills silence.
        Asks questions she already knows the answer to — not
        manipulatively, but because the patient needs to say it themselves.

# ===========================================================================
# STRAND 3: THEMATIC DNA (Upgraded — paradox structure + synthesis)
# ===========================================================================
thematic_dna:
  central_theme:
    statement: "Stories are bridges, not weapons — but bridges cost something to cross."
    exploration: >
      The film explores THREE relationships with stories:
      1. Stories as ANESTHESIA (Olenka in Calais — reading to numb)
      2. Stories as WEAPONS (Olenka in Berlin — manifestations as power)
      3. Stories as BRIDGES (Olenka at the telling — sharing as connection)
      The argument: options 1 and 2 are both forms of HIDING. Only option 3
      requires vulnerability. And vulnerability is the only thing that stops
      the hemorrhage.

  thematic_paradox:
    statement: "The thing that saves you is the thing that's eating you."
    resolution: >
      The stories don't stop eating memories. They just change WHAT they
      eat. When Olenka wields them as weapons, they eat precious memories
      (names, faces, feelings). When she shares them as stories, they eat
      SHAME — the toxic sediment of unprocessed trauma. Same mechanism.
      Different fuel. The fire doesn't go out. You choose what burns.

  supporting_themes:
    - id: theme_displacement
      statement: "Displacement isn't a status — it's a ongoing verb."
      beats_present: [beat_01, beat_03, beat_05, beat_11, beat_15]
      key_image: >
        The Ausländerbehörde waiting room — 200 people, one counter.
        This is displacement: not the journey, but the WAITING. The
        permanent impermanence. Olenka will never have a scene where
        displacement "ends." It changes form. That's all.

    - id: theme_pain_hierarchy
      statement: "Ranking suffering is a form of violence."
      beats_present: [beat_09, beat_10, beat_12, beat_14]
      key_image: >
        Olenka telling Anna "You've never had a real problem in your life."
        This is the moment the film's moral center flips — the protagonist
        becomes the antagonist. Because ranking pain is what was done to
        Olenka (your Ukrainian problems aren't as bad as Syrian problems,
        your displacement isn't as bad as...) and she reproduces it
        PERFECTLY on a ten-year-old with a stuffed rabbit.

    - id: theme_inheritance
      statement: "Cultural inheritance is a gift AND a burden. You can't accept one without the other."
      beats_present: [beat_02, beat_08, beat_12, beat_14]
      key_image: >
        The book with pages out of order. Olenka ADDING her own notes
        in the margins. Not replacing Halyna's stories — annotating them.
        Continuing them. Inheritance isn't preservation. It's evolution.

    - id: theme_silence
      statement: "Silence is not safety — it's a slow form of disappearing."
      beats_present: [beat_01, beat_07, beat_11, beat_14]
      key_image: >
        Lys at beat_11: "You need to stop HIDING. That's what's eating
        you. Not the magic. The silence." The real monster isn't the
        manifestations — it's the refusal to speak in your own voice.

# ===========================================================================
# STRAND 4: VISUAL DNA (Upgraded — more specific rendering direction)
# ===========================================================================
visual_dna:
  color_palettes:
    - id: palette_calais
      context: "Processing center — institutional non-color"
      primary: "#C4C4B0"    # Institutional beige
      secondary: "#6B7B6E"  # Mold green
      accent: "#D4442A"     # Olenka's vyshyvanka red — the ONLY color
      notes: >
        Calais is deliberately ugly. Fluorescent light. Green-painted
        walls. Basketball lines on the floor from the building's previous
        life. The ONLY saturated color is Olenka's embroidery — which
        makes her a target and a beacon simultaneously.

    - id: palette_berlin
      context: "Berlin apartment — curated middle-class comfort"
      primary: "#F5F0E8"    # IKEA white
      secondary: "#B8A088"  # Warm wood tones
      accent: "#8B65A3"     # Anna's purple fairy lights
      notes: >
        Berlin is COMFORTABLE, which is its own kind of violence when
        you're a guest. Everything is slightly too clean, too organized,
        too intentional. The Neumanns' kindness is expressed through
        interior design — Olenka can't break anything because everything
        was chosen carefully.

    - id: palette_manifestation
      context: "When fairy tales breach reality"
      primary: "#1A1A1A"    # Deep black (the Wolf's iron)
      secondary: "#FF6B1A"  # Ember orange (the Wolf's eyes, the Firebird)
      accent: "#00E0D0"     # Uncanny teal (wrong color temperature)
      notes: >
        Manifestations violate the color palette of whatever scene they
        appear in. If the scene is warm, the manifestation is cold.
        If cool, hot. They are CHROMATIC INVADERS — their colors don't
        belong in the real world's palette.

    - id: palette_telling
      context: "Community center finale"
      primary: "#2C1810"    # Warm dark (evening, low light)
      secondary: "#E8C87A"  # Candlelight gold
      accent: "#D4442A"     # Vyshyvanka red — RETURNED to full saturation
      notes: >
        The telling scene uses warm practical lighting — no fluorescents,
        no fairy lights. Candles and standing lamps. The warmth is EARNED,
        not given. The vyshyvanka red returns to full saturation but
        shifted slightly warmer (more orange). Not restoration. Continuation.

  visual_motifs:
    - id: motif_vyshyvanka
      element: "Olenka's embroidered blouse"
      usage: "The embroidery DESATURATES 15% per act. Full red in Calais, muted in Berlin midpoint, nearly grey at All Is Lost, returns warm-shifted in finale."
      meaning: "Cultural identity as something that can be drained by misuse and restored (differently) through sharing."

    - id: motif_book
      element: "Halyna's fairy tale book"
      usage: "Always present. Pages warm before manifestation. Blank pages where creatures have LEFT. Olenka's handwriting appearing in margins through Act 3."
      meaning: "The physical medium of inheritance — damaged, rearranged, annotated. A living document, not a relic."

    - id: motif_mirror
      element: "Reflective surfaces"
      usage: "Beat 4: first manifestation in bathroom mirror. Beat 11: Olenka doesn't recognize herself. Beat 14: the audience's faces reflected in Olenka's eyes during the telling."
      meaning: "Identity as reflection — what you see depends on what you're carrying."

    - id: motif_glass
      element: "Broken glass"
      usage: "Beat 9: Neumann family photo shattered by Wolf. Beat 12: Olenka throws the book (pages scatter like glass). Beat 14: the community center windows — intact — reflecting the manifestations."
      meaning: "Fragmentation and its aftermath. Glass breaks once. You clean it up or step around it forever."

  animation_style: >
    Photorealistic base with selective stylization during manifestation
    sequences. The real world is rendered with documentary-level detail
    (processing centers, IKEA furniture, school corridors). Manifestations
    break the realism with scale violations, impossible lighting, and
    chromatic invasion. The tension between the two is the visual grammar.

    Character animation prioritizes STILLNESS over action. The most
    powerful moments are faces not moving. Olenka's hand not reaching
    the door. Anna's expression crumbling in real-time. Eight seconds
    of static camera on a child crying through a wall.

# ===========================================================================
# STRAND 5: PACING DNA
# ===========================================================================
pacing_dna:
  tension_curve:
    points:
      - [0.00, 0.3]    # Opening — functional sadness
      - [0.04, 0.2]    # Theme stated — quiet
      - [0.07, 0.2]    # Setup — equilibrium
      - [0.12, 0.7]    # Catalyst — Lys arrives, lamp EXPLODES
      - [0.17, 0.5]    # Debate — testing, Elif scene
      - [0.25, 0.6]    # Break into 2 — Wolf in stairwell
      - [0.35, 0.7]    # Fun & games — mounting power
      - [0.42, 0.8]    # Midpoint — false victory collapses
      - [0.50, 0.9]    # Bad guys — Olenka hurts Anna
      - [0.58, 0.4]    # All is lost — Halyna's face gone (LOW arousal, HIGH pain)
      - [0.65, 0.6]    # Dark night — triple blow
      - [0.75, 0.9]    # Break into 3 — Halyna's video, Olenka screams
      - [0.82, 0.5]    # Gathering — quiet preparations
      - [0.87, 0.9]    # The Telling — climax
      - [0.95, 0.3]    # Final image — bittersweet calm
      - [1.00, 0.2]    # Last frame — continuation

  rhythm_pattern: >
    Act 1: LINGERING. Long dissolves between Ukraine memory and European
    present. Sound bridges — Halyna's voice fading over institutional hum.
    Shots hold 1-2 seconds longer than comfortable.

    Act 2a: CONTROLLED RHYTHM. Berlin scenes have the pace of routine —
    school, apartment, school. Manifestations BREAK the rhythm with sudden
    cuts and wrong-duration shots (too long OR too short).

    Act 2b: DECELERATION. The Anna scene plays in near-real-time. No cuts
    during Olenka's cruel speech. The camera doesn't look away. The crying
    through the wall plays for EIGHT SECONDS of static camera.

    Act 3: ACCELERATION into preparations → then HOLD. The telling is
    performed in long takes. Olenka speaking uninterrupted. The rhythm
    matches oral storytelling cadence: pause, build, pause, release.
    The manifestations in the telling are SLOW — the Wolf lies down
    slowly. Lys walks the table slowly. Mavka dissolves slowly. No
    urgency. This is a ceremony, not a battle.

# ===========================================================================
# STRAND 6: AUDIO DNA
# ===========================================================================
audio_dna:
  dialogue_ratio: 0.38
  music_coverage: 0.45

  silence_moments:
    - beat_id: beat_04
      duration_seconds: 4.0
      purpose: >
        After Lys's arrival — the lamp explodes, Frau Neumann calls out,
        then SILENCE. Olenka looks at the fox. The fox looks at her. Four
        seconds of mutual assessment. No score. Just breathing and the
        distant sound of the Neumann apartment (clock, fridge hum).

    - beat_id: beat_09
      duration_seconds: 8.0
      purpose: >
        After "You've never had a real problem in your life." EIGHT
        SECONDS. Anna's face. Then Anna walking away. No music. No score.
        Just the sound of a child leaving a room with a stuffed rabbit.
        Then: crying through a wall. The silence is the loudest thing
        in the film.

    - beat_id: beat_10
      duration_seconds: 6.0
      purpose: >
        Olenka trying to remember Halyna's face. Eyes closed. Six seconds
        of TRYING. The silence is the sound of a memory not arriving.

    - beat_id: beat_11
      duration_seconds: 5.0
      purpose: >
        After Olenka says her own name and it sounds foreign. Five seconds
        of her looking in the mirror at a stranger. Lys grooming his tail.
        No one speaks.

    - beat_id: beat_14
      duration_seconds: 3.0
      purpose: >
        After the Wolf lies down at Olenka's feet. The audience gasps, then
        SILENCE. Three seconds of a wolf resting. Then Olenka continues.
        The silence is the audience understanding this was never about
        power.

  music_style:
    genre: "Sparse chamber music with Ukrainian folk elements"
    reference: "Hildur Guðnadóttir meets Valentin Silvestrov"
    emotional_arc_follows: true
    instruments:
      - "Solo cello — Olenka's thread between scenes. Not sad. Taut."
      - "Bandura — Ukraine memories ONLY. Never in present-day scenes."
      - "Prepared piano — manifestation moments. Dampened strings. Wrong notes."
      - "Children's voices — NOT a choir. Two or three, unpolished. Finale only."
      - "Silence — treated as an instrument. More silence than score in Act 2b."
      - "Field recordings — real ambient: processing centers, trains, school corridors."
      - "Subsonic rumble (15-25Hz) — the Wolf's audio signature. Felt, not heard."

  voice_styles:
    char_olenka:
      style: >
        Clipped, defensive, accent strong. Gets very quiet before cruelty.
        Cracks once (beat_12 — screaming at Halyna's video). After that,
        softer, less controlled. In the telling: measured, finding rhythm.
    char_lys:
      style: >
        Dry, archaic Ukrainian cadence. Precise. Never loud. Terrifyingly
        calm during truths. When afraid (beat_11): the calm BREAKS — his
        voice drops to a whisper. It's the only time Olenka realizes he's
        not invulnerable.
    char_halyna:
      style: >
        Low, determined. Not warm — purposeful. Video message: hands
        shaking, trying to be strong. Voice DEGRADES through the film —
        earlier memories clear, later memories have audio artifacts,
        distortion, as if the recording medium is decaying.
    char_berger:
      style: >
        Measured. Therapeutic cadence. German accent. Pen clicking in
        pauses. Never fills silence. Asks questions she already knows
        the answer to.
    char_elif:
      style: >
        Fast, sharp. Code-switches German/Turkish. Sarcasm as affection.
        Gets QUIET when truly angry (learned from watching her mother
        perform calm for authorities).


# ===========================================================================
# STRAND 7: SCENE MANIFEST (Two key scenes, fully shot-listed)
# ===========================================================================
scene_manifest:
  scenes:

    # =======================================================================
    # SCENE 1: The First Manifestation (Berlin — Lys Arrives)
    # Function: Catalyst — the fairy tales are alive and DANGEROUS
    # Zootopia equivalent: Judy's first day — the promise of the premise
    # =======================================================================
    - id: scene_lys_arrival
      beat_id: beat_04
      act: 1
      location: >
        Neumanns' apartment, Berlin-Neukölln. Olenka's room (the guest
        room). Single bed, IKEA HEMNES desk, a Bauhaus print Frau Neumann
        chose. Olenka's few possessions: the book, a phone charger, a
        ziplock bag of photographs (she hasn't opened it since Kraków).
        9:40 PM, September. Street sounds — Turkish music from a café
        below, a S-Bahn in the distance.
      time_of_day: night
      weather: "Clear. Cold. Window slightly open."
      characters_present: [char_olenka, char_lys]
      emotional_target:
        valence: 0.1
        arousal: 0.8
      duration_seconds: 78

      shots:
        - id: shot_room_wide
          type: wide_establishing
          duration_seconds: 4.0
          camera_movement: static
          description: >
            Wide shot of the room. Sparse. The bed is made with military
            precision (Olenka's habit). The Bauhaus print. The book on
            the desk, closed. Olenka sits on the bed in her vyshyvanka
            and sweatpants, scrolling her phone — looking at the Calais
            group chat. Messages in French she now understands.
            She puts the phone down. Picks up the book.
          sfx: ["street_ambient_neukoelln", "s_bahn_distant"]
          transition_to_next: cut

        - id: shot_olenka_reading
          type: close_up
          duration_seconds: 5.0
          camera_movement: slow_push
          description: >
            Close-up of Olenka's face as she reads. Lips moving. The story
            of Lys Mykyta. Her expression shifts — not enjoyment. Something
            harder. She's ANGRY at the book. At the routine of reading it.
            At the fact that it's all she has of Halyna and she's starting
            to resent it.
            The page begins to glow. Warm orange light on her face. She
            doesn't notice — her eyes are on the words.
          sfx: ["page_turning", "breathing"]
          transition_to_next: cut

        - id: shot_page_ignites
          type: extreme_close_up
          duration_seconds: 3.0
          camera_movement: static
          description: >
            ECU of the book page. The illustration of Lys Mykyta — a
            hand-drawn fox in red and gold ink, Halyna's careful linework.
            The ink MOVES. The fox's tail twitches. The eye blinks. Then
            the entire illustration LIFTS off the page like heat rising
            from asphalt. The page goes blank — warm, as if something
            just left.
          sfx: ["paper_warming", "SUBSONIC_RUMBLE_begins"]
          transition_to_next: cut

        - id: shot_lys_on_windowsill
          type: medium
          duration_seconds: 4.0
          camera_movement: static
          description: >
            Medium shot of the windowsill. LYS is there. Full physical
            presence — copper fur catching the streetlight, one amber
            eye, one black, the embroidered vest. He's grooming a paw,
            casual, as if he's been there for hours.
            He looks up at Olenka. Head tilt. The vest's embroidery
            matches her vyshyvanka EXACTLY.
          dialogue: >
            LYS: Finally. Do you know how long I've been waiting in that
            page? It smells like old paper and your grandmother's hand cream.
          sfx: ["fox_paw_grooming", "street_ambient"]
          transition_to_next: cut

        - id: shot_lamp_explodes
          type: wide
          duration_seconds: 2.5
          camera_movement: static_then_shake
          description: >
            Wide shot. Olenka backs against the headboard. Her eyes wide.
            The temperature drops — visible breath. Then: the IKEA desk
            lamp EXPLODES. Glass and plastic shrapnel. Camera SHAKES.
            Olenka shields her face. The room is suddenly lit only by
            streetlight and the fading glow from the book.
            Frau Neumann's voice from the hallway: "Olenka? Alles in
            Ordnung?"
          dialogue: "FRAU NEUMANN: (muffled, through door) Olenka? Alles in Ordnung?"
          sfx: ["lamp_explosion", "glass_scatter", "temperature_drop_creak", "frau_neumann_voice_muffled"]
          transition_to_next: cut

        - id: shot_lys_explains
          type: two_shot_medium
          duration_seconds: 6.0
          camera_movement: slow_push
          description: >
            Two-shot: Olenka pressed against the headboard, Lys on the
            windowsill. Streetlight between them. Lys is unperturbed by
            the explosion. His tail swishes slowly.
          dialogue: >
            LYS: That wasn't me. That was you. You CALLED me with something —
            what was the feeling? Right before you read the line? What were
            you feeling?
            OLENKA: (shaking) I don't — I was just reading—
            LYS: No. You were FURIOUS. At the checklist kindness. At the
            clean towels on a schedule. At being grateful for a room that
            isn't yours. THAT is what called me. Rage. Good fuel. Bad aim.
          sfx: ["breathing_heavy", "book_settling"]
          transition_to_next: cut

        - id: shot_memory_cost
          type: close_up
          duration_seconds: 5.0
          camera_movement: static
          description: >
            Close-up of Olenka's phone. A text from Calais — Danylo's
            mother forwarding a photo. Olenka and Danylo, smiling, the
            processing center behind them. Olenka stares at his face.
            She remembers the missing tooth. The blue jacket. But the
            NAME. It's gone. She scrolls up — looking for a text where
            she used his name. She can't find one. She never wrote it
            down. Why would you write down something you know?
            Her face: the first REAL understanding of what just happened.
            Not wonder. COST.
          sfx: ["phone_scrolling", "SILENCE"]
          transition_to_next: fade_to_black

    # =======================================================================
    # SCENE 2: Olenka Hurts Anna (Berlin Apartment)
    # Function: Bad Guys Close In — the protagonist IS the bad guy
    # Zootopia equivalent: Press conference (protagonist's bias exposed)
    # =======================================================================
    - id: scene_olenka_hurts_anna
      beat_id: beat_09
      act: 2
      location: >
        Neumanns' apartment, Berlin-Neukölln. Anna's bedroom. IKEA
        HEMNES bed, white duvet with horses. Shelf of German/English
        books. Stuffed rabbit (Hase) on pillow — grey, one ear flopping.
        Purple fairy lights around window. 7:15 PM, October.
      time_of_day: evening
      weather: "Berlin autumn rain, heard through closed window"
      characters_present: [char_olenka, char_lys]
      emotional_target:
        valence: -0.6
        arousal: 0.7
      duration_seconds: 94

      shots:
        - id: shot_anna_bedroom
          type: wide_establishing
          duration_seconds: 3.0
          camera_movement: static
          description: >
            Wide shot. Purple fairy lights. Horse duvet. Anna (10, round
            face, nervous energy) cross-legged on bed, showing Olenka
            her bookshelf with desperate hospitality. "You can borrow
            any of them!" Olenka in the doorway, arms crossed, not
            entering fully.
          dialogue: >
            ANNA: You can borrow any of them! This one's really good,
            it's about a girl who finds a dragon—
          sfx: ["rain_on_window_soft", "fairy_lights_hum"]
          transition_to_next: cut

        - id: shot_anna_vulnerability
          type: medium_two_shot
          duration_seconds: 6.0
          camera_movement: static
          description: >
            Two-shot. Anna on bed, Olenka on edge — barely sitting.
            Anna pulls Hase onto her lap. Her face shifts from hosting
            to real. She tells Olenka about the birthday party. Her
            voice is small. She's asking for connection.
          dialogue: >
            ANNA: (holding rabbit) My best friend, Lena? She's having a
            birthday party next Saturday and she invited everyone except
            me. And I don't know what I did wrong. I keep thinking about
            what I said or— (looks at Olenka, eyes wet) —do you ever feel
            like you did something wrong but you don't know what?
          sfx: ["rain_on_window", "clock_ticking"]
          transition_to_next: cut

        - id: shot_olenka_cruelty
          type: close_up
          duration_seconds: 7.0
          camera_movement: static
          description: >
            Close-up of Olenka. STATIC CAMERA. NO SCORE. She looks at
            Anna. Something behind her eyes — contempt born from pain.
            Someone carrying a weight too heavy who just watched someone
            complain about a pebble.
            She doesn't raise her voice. That's what makes it worse.
          dialogue: >
            OLENKA: (flat, quiet) That's your problem? Someone didn't
            invite you to a party?
            (two-second pause)
            You've never had a real problem in your life.
          sfx: ["SILENCE", "clock_ticking_returns_after_line"]
          transition_to_next: cut

        - id: shot_anna_crumbles
          type: close_up
          duration_seconds: 4.0
          camera_movement: static
          description: >
            Close-up of Anna's face. The crumble. Not dramatic — a
            ten-year-old learning that someone she wanted to like her
            thinks she's nothing. Anna picks up Hase. Gets off bed.
            Walks past Olenka without looking. Goes to bathroom.
            Door closes. Lock clicks.
          sfx: ["door_closing_soft", "lock_clicking"]
          transition_to_next: cut

        - id: shot_olenka_frozen
          type: medium
          duration_seconds: 8.0
          camera_movement: static
          description: >
            Medium shot. Olenka alone in Anna's bedroom. Fairy lights
            pulse. Through wall: a ten-year-old crying quietly, trying
            not to be heard. Olenka's jaw tightens. Her hand moves
            toward the door. Stops. Drops. She CANNOT knock.

            LYS appears on the windowsill. Not smirking. For once.
          dialogue: >
            LYS: That was ugly.
            OLENKA: Shut up.
            LYS: You just did what everyone has done to you. Told
            someone their pain doesn't count.
          sfx: ["child_crying_through_wall", "rain_on_window", "fairy_lights_hum"]
          transition_to_next: cut

        - id: shot_wolf_manifests
          type: wide
          duration_seconds: 4.0
          camera_movement: static_then_shake
          description: >
            Wide shot of the hallway. The Iron Wolf — unbidden, fed by
            shame. Enormous, black iron scraping walls. He doesn't roar.
            His tail SWIPES the Neumann family photo. Glass shatters.
            Anna screams from bathroom.

            The Wolf looks at Olenka — with nothing. Pre-moral. He's
            force shaped like an animal, summoned by a feeling she
            couldn't contain. He fades. The glass remains.
          dialogue: "ANNA: (from bathroom, scared) Was ist passiert?!"
          sfx: ["iron_scraping_walls", "glass_shattering", "anna_scream_muffled"]
          transition_to_next: fade_to_black

# ===========================================================================
# STRAND 8: RENDERING HINTS
# ===========================================================================
rendering_hints:
  preferred_models:
    character_closeups: "kling_3.0"
    establishing_shots: "veo_3.1"
    dialogue_scenes: "seedance_2.0"
    action_sequences: "hunyuan_video"
    bulk_transitions: "wan_2.1"
    manifestation_sequences: "veo_3.1"

  budget_mode: false
  max_cost_usd: 750
  quality_threshold: 0.88
  target_resolution: "1080p"
  target_fps: 24

  special_rendering_notes: >
    MANIFESTATION SEQUENCES: Must look WRONG in a specific way.
    Photorealistic but violating: scale (too large for room), lighting
    (own light source in practically-lit scene), physics (Wolf too
    heavy for any floor). Use Veo 3.1 for realism, then deliberately
    break ONE physical rule per manifestation. Uncanny, not magical.

    MEMORY DEGRADATION: Flashback inserts of Ukraine degrade — not like
    film damage, but like trying to remember: out of focus, wrong colors,
    details missing. Halyna's face: blur → shape → nothing. Gradual
    Gaussian blur on face regions across runtime.

    VYSHYVANKA DESATURATION: Red embroidery tracked as persistent element.
    Desaturates 15% per act. Returns to full in finale — but DIFFERENT
    red (warmer, more orange). Not restoration. Continuation.

    NO SCORE DURING MANIFESTATIONS: Only practical sound plus one element:
    subsonic rumble at 15-25Hz (felt, not heard). This is the horror
    audio signature. Fairy tales don't get beautiful music. They get the
    sound of a building settling wrong.

    TELLING SCENE LIGHTING: Community center lit by practical sources
    only — standing lamps, candles brought by attendees. The manifestations
    in the telling provide their OWN light (the Wolf's ember eyes, Lys's
    copper fur catching candlelight, Mavka's birch-glow). This is the
    visual reversal: in Act 2, manifestations violated the lighting.
    In Act 3, they CONTRIBUTE to it.

# ===========================================================================
# STRAND 9: DIALOGUE DNA (NEW in v3)
# ===========================================================================
dialogue_dna:
  philosophy: >
    Dialogue in Kazka follows three rules:
    1. Nobody says what they mean on the first try.
    2. The most important lines are REACTIONS, not statements.
    3. Silence is dialogue.

  signature_lines:
    - character: char_olenka
      line: "You've never had a real problem in your life."
      beat: beat_09
      subtext: "I am in so much pain that I need your pain to be nothing."

    - character: char_lys
      line: "You just did what everyone has done to you."
      beat: beat_09
      subtext: "The cycle reproduces in you. You are not exempt."

    - character: char_halyna
      line: "I should have told you the TRUTH inside the stories."
      beat: beat_12
      subtext: "I protected you from complexity and it made you brittle."

    - character: char_berger
      line: "The love isn't in the face. It's in the ache where the face used to be."
      beat: beat_10
      subtext: "Loss doesn't end love. It changes its address."

    - character: char_elif
      line: "Guests get invited. We got processed."
      beat: beat_05
      subtext: "Don't confuse toleration with welcome."

    - character: char_olenka
      line: "They're not stupid. They're just hers. And I need to make them mine."
      beat: beat_12
      subtext: "Inheritance isn't acceptance. It's reinterpretation."

    - character: char_lys
      line: "Same time tomorrow?"
      beat: beat_15
      subtext: "The stories continue. Not as rescue. As routine. As companionship."

  dialogue_rules:
    - rule: "No exposition through dialogue. If information must be conveyed, convey it through ACTION or DOCUMENT (letters, texts, bureaucratic forms)."
    - rule: "Ukrainian dialogue is NOT subtitled with elegant translation. It's rough, direct, sometimes losing meaning in translation. The audience should feel the gap."
    - rule: "Olenka's German improves through the film. By Act 3 she code-switches fluidly. The language learning IS character development."
    - rule: "Lys never uses contractions. His speech is formally structured — an ancient creature speaking a young girl's language."
    - rule: "Berger never says 'I understand.' She says 'I'm here.' Because she CAN guarantee presence. She cannot guarantee understanding."

# ===========================================================================
# STRAND 10: WORLD RULES (NEW in v3)
# ===========================================================================
world_rules:
  magic_system:
    name: "Manifestation Logic"
    rules:
      - id: rule_trigger
        statement: "Manifestations are triggered by SPECIFIC EMOTIONS, not by reading alone."
        detail: >
          Reading the book without feeling = nothing happens.
          Reading with specific emotional fuel = manifestation.
          Later: THINKING of the story with emotion = manifestation (no book needed).
          The emotions that trigger: RAGE, FEAR, PROTECTIVE FURY, SHAME.
          The emotion that DOESN'T trigger: grief. Grief is too honest.
          The manifestations feed on AVOIDANCE emotions — feelings that
          push outward instead of processing inward.

      - id: rule_cost
        statement: "Every manifestation extracts a memory as fuel."
        detail: >
          Cost escalates with power:
          Small manifestation (shadow, flicker) = peripheral memory (a name, a smell)
          Medium manifestation (partial creature) = emotional memory (a feeling, a routine)
          Full manifestation (creature acts in world) = identity memory (a face, a self-concept)
          The system is NOT random. It takes the memory most connected to
          the emotion that triggered the manifestation. Rage at displacement
          = loses a memory of HOME. Protective fury for Elif = loses a
          memory of being PROTECTED.

      - id: rule_visibility
        statement: "Others can see manifestations, but perception depends on intent."
        detail: >
          Weaponized manifestations: others feel EFFECTS but can't see
          the creature clearly (shadows, temperature, sounds, damage).
          Shared manifestations (Act 3): others can SEE the creatures
          fully. The difference is Olenka's intent. Weapons hide. Gifts
          reveal.

      - id: rule_autonomy
        statement: "Manifestations gain autonomy as Olenka loses control."
        detail: >
          Beat 4-6: Olenka controls what manifests and when.
          Beat 7-8: Manifestations respond faster than intended.
          Beat 9: The Wolf manifests WITHOUT Olenka's intent (shame-triggered).
          Beat 11: The stories "lean toward" emotions like plants toward light.
          Beat 14: Controlled again — but through SHARING, not suppressing.

      - id: rule_reversal
        statement: "Telling stories VOLUNTARILY reverses the cost mechanism."
        detail: >
          When Olenka TELLS a story (shares it, gives it to others), the
          cost inverts. Instead of taking a precious memory, the
          manifestation takes TOXIC memory — shame, guilt, self-hatred.
          Same mechanism. Different fuel. The fire doesn't go out.
          You choose what burns.

  physical_rules:
    - "Manifestations violate ONE physical law per appearance (scale, lighting, weight, temperature)."
    - "Damage from manifestations is REAL and PERMANENT (broken glass, burst pipes, scorched walls)."
    - "The book's pages go blank when a creature leaves, and warm to the touch."
    - "Olenka's vyshyvanka embroidery desaturates with each manifestation (physical, measurable change)."
    - "Manifestations cannot cross RUNNING WATER (homage to Ukrainian folklore — Olenka discovers this accidentally in a rainstorm)."

  displacement_rules:
    - "Temporary Protection Directive = mass status, not individual assessment. Renewable but never permanent."
    - "Ausländerbehörde = the physical antagonist. Not evil — procedural. Which is worse."
    - "Gastfamilie ≠ legal guardian. The Neumanns' kindness has no legal authority."
    - "Integration = performance. Olenka must DEMONSTRATE belonging to bureaucrats who measure it in documents."
    - "Language acquisition is tracked. Olenka's German improving is both character development AND survival strategy."

# ===========================================================================
# STRAND 11: AUDIENCE PSYCHOLOGY PER BEAT (NEW in v3)
# ===========================================================================
audience_psychology:
  philosophy: >
    Every beat is designed to produce a SPECIFIC audience response.
    Not "the audience feels sad" — that's lazy. The exact cognitive
    and emotional state the audience should be in, and the narrative
    mechanism that produces it.

  beat_responses:
    - beat_id: beat_01
      target_response: "Competence respect + discomfort"
      mechanism: >
        Show Olenka as SKILLED at survival. She knows the system. She's
        efficient. The audience should think "this kid is impressive"
        and simultaneously feel uneasy — because a 14-year-old shouldn't
        NEED to be this competent. Competence as evidence of damage.

    - beat_id: beat_04
      target_response: "Genre confusion → dread"
      mechanism: >
        The lamp explosion should make the audience uncertain: is this a
        fantasy film or a horror film? The fairy tale fox is CHARMING
        but the physical destruction is REAL. The memory cost (Danylo's
        name) should land as a gut punch — the audience liked the magic
        until they learned the price.

    - beat_id: beat_06
      target_response: "Conflicted catharsis"
      mechanism: >
        The bullies deserve what they get. The Wolf in the stairwell is
        SATISFYING. The audience should CHEER — and then feel the cost
        (lost smell of Halyna's kitchen) and realize they just cheered
        for something that costs everything. Mirror of how we consume
        revenge narratives.

    - beat_id: beat_09
      target_response: "Moral whiplash"
      mechanism: >
        The audience has been rooting for Olenka. She's sympathetic.
        She's displaced. She's powerful. Then she devastates a
        ten-year-old. The audience should feel BETRAYED — and then
        recognize: they ranked Anna's pain as less important too.
        They accepted the suffering hierarchy. They're complicit.

    - beat_id: beat_10
      target_response: "Existential vertigo"
      mechanism: >
        Forgetting a face you've known your whole life. The audience
        should feel their OWN memory tested — can YOU picture your
        grandmother's face right now, exactly? The six seconds of
        silence isn't just for Olenka. It's for the audience.

    - beat_id: beat_11
      target_response: "Claustrophobia — external AND internal walls closing"
      mechanism: >
        Legal threat + emotional rupture + identity dissolution
        simultaneously. The audience should feel TRAPPED with Olenka.
        No escape route. The stories can't save her (they're the
        problem). The system can't save her (it's indifferent).
        People can't save her (she's pushed them away). Only SHE
        can save herself — and she doesn't recognize herself.

    - beat_id: beat_12
      target_response: "Cathartic anger → understanding → grief"
      mechanism: >
        The audience should SCREAM with Olenka at the video. Feel her
        rage as righteous. Then watch her hear herself — hear the echo
        of "your stupid stories won't save us" — and feel the shift:
        not from anger to calm, but from anger to COMPREHENSION.
        Halyna was terrified. The slap was fear, not violence. The
        book was desperation, not burden. The audience should cry
        not because it's sad but because they finally UNDERSTAND.

    - beat_id: beat_14
      target_response: "Earned wonder"
      mechanism: >
        The manifestations in the telling are the same creatures
        the audience has been afraid of. But now they're GENTLE.
        The Wolf lies down. Lys bows. Mavka dissolves into leaves.
        The wonder is earned because the audience has seen these
        creatures at their worst. Transformation isn't announced —
        it's demonstrated. The audience should feel that the stories
        haven't changed. Olenka has.

    - beat_id: beat_15
      target_response: "Bittersweet resolve"
      mechanism: >
        No triumph. No rescue. "Okay" is the speed of bureaucracy.
        The uncertainty is permanent. But Olenka is READING in her own
        voice. The audience should leave with the feeling: nothing is
        fixed, but something has changed. And sometimes "something has
        changed" is the entire revolution.

