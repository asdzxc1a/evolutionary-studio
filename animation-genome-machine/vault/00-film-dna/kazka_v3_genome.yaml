           in the bathroom groan. Something MASSIVE shifts behind the
           wall. She slams the book shut. The pipes stop.
        3. She tries to read "The Firebird" while deliberately feeling
           nothing. The page stays flat. Dead.

        Lys observes from various perches (windowsill, bookshelf, top of
        the wardrobe). He offers commentary:

        LYS: "You're testing the system. Smart. But you're testing it
        like an engineer. The stories don't care about your experiments.
        They care about your NEED."

        OLENKA: "I don't need anything from a book."

        LYS: "Then why did you carry it across four countries instead of
        food?"

        [FIX #1 — Elif scene:]
        School introduction. Olenka meets ELIF (13, Turkish-German,
        hijab, sharp tongue, been in Germany since age 3 but still
        gets called 'the Turkish girl'). Elif is assigned as Olenka's
        "integration buddy" — she hates the term.

        ELIF: "I'm supposed to help you 'integrate.' Which means I show
        you where the good kebab is and pretend the bureaucracy isn't
        designed to make you feel like a guest in your own life."

        Olenka: "I AM a guest."

        ELIF: (stops walking) "No. Guests get invited. We got processed."

        [FIX #1 — Elif's displacement pain, not decoration:]
        After school. Elif takes Olenka to the Ausländerbehörde
        (foreigners' registration office) to pick up a document for her
        mother. The waiting room: 200 people, one working counter, a
        ticket machine that's out of paper.

        ELIF: (sitting on the floor, eating chips) "My mom's been here
