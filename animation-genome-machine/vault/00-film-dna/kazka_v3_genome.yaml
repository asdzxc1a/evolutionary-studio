        Olenka doesn't respond. She's sorting by size.

        MARIE: "Olenka — le livre de ta grand-mère. Tu le lis aux autres,
        mais... tu l'écoutes, toi?" (Your grandmother's book. You read it
        to others, but... do you listen to it yourself?)

        Olenka looks at her. "It's just stories. Babusya wrote them down
        so we wouldn't forget."

        MARIE: "Forgetting isn't the worst thing. The worst thing is
        remembering without feeling anything."

        Olenka goes back to the shoes. Marie lights a cigarette outside
        the emergency exit. The conversation is over.

        But the theme has been stated: Stories aren't facts to preserve —
        they're feelings to transmit. If you read them without feeling them,
        you're already forgetting.

